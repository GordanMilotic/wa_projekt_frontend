<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="favicon.jpg" />
    <link rel="script" type="text/javascript" href="loginVlasnik.js" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="loginVlasnik.css"
    />
    <title>PoolProof</title>
  </head>
  <body>
    <img src="logo1.jpg" alt="" />
    <div class="type_of_login">
      <div class="zaposlenik">
        <input type="button" id="button" onclick="location.href='loginZaposlenik.html';" value="ZAPOSLENIK" />
      </div>

      <div class="vlasnik">
        <input type="button" id="button" onclick="" value="VLASNIK" />
      </div>
    </div>

    <div class="inputs">
        <h2>Prijavite se sa svojim računom</h2>
  
        <form method="post">
          <div class="text_input">
            <input type="text" placeholder="Ime" required />
          </div>
  
          <div class="text_input">
            <input type="text" placeholder="Prezime" required />
          </div>

          <div class="text_input">
            <input type="password" placeholder="Lozinka" required/>
          </div>
  
          <div class="button">
            <input
              type="button"
              onclick="location.href='mainVlasnik.html';"
              value="Prijava"
            />
          </div>
        </form>
  </body>
</html>
