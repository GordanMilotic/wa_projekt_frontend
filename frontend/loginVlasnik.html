<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="favicon.jpg" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="loginVlasnik.css"
    />
    <title>PoolProof</title>
  </head>
  <body>
    <img src="logo1.jpg" alt="" />
    <div class="type_of_login">
      <div class="zaposlenik">
        <input
          type="button"
          id="button"
          onclick="location.href='loginZaposlenik.html';"
          value="ZAPOSLENIK"
        />
      </div>

      <div class="vlasnik">
        <input type="button" id="button" onclick="" value="VLASNIK" />
      </div>
    </div>

    <div class="inputs" id="inputs">
      <h2>Prijavite se sa svojim računom</h2>

      <form onsubmit="" method="post" id="form">
        <div class="text_input">
          <input type="text" placeholder="Ime" id="ime" />
        </div>

        <div id="error"></div>

        <div class="text_input">
          <input type="text" placeholder="Prezime" id="prezime" />
        </div>

        <div class="text_input">
          <input type="text" placeholder="Šifra objekta" id="sifraObjekta" />
        </div>

        <div class="text_input">
          <input type="password" placeholder="Lozinka" id="lozinka" />
        </div>

        <div class="button">
          <button type="submit" id="button">Prijava</button>
        </div>
      </form>
    </div>
    <script type="text/javascript" src="loginVlasnik.js"></script>
  </body>
</html>
