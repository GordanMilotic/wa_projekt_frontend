<!DOCTYPE html>
<html lang="en">
  <head>

  <body>
    <img src="logo1.jpg" alt="" />
    <div class="type_of_login">
      <div class="zaposlenik">

          <input type="password" placeholder="Lozinka" required="required" />

        <div class="button">
